services:
  - type: web
    name: infra-scope-api
    runtime: node
    buildCommand: npm install && npm run db:generate && turbo run build --filter=@infra-scope/server
    startCommand: node apps/server/dist/app.js
    envVars:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
