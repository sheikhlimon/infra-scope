services:
  - type: web
    name: infrascope-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run db:generate --workspace=@infra-scope/db && npm run build --workspace=@infra-scope/db && npm run build --workspace=@infra-scope/server
    startCommand: npm run start --workspace=@infra-scope/server
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
